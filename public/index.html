<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00ff87">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FPL Hub">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:;">
<meta name="description" content="FPL deadline countdown, top players, predictions & live scores">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>FPL Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"></noscript>
<style>
  :root{--green:#00ff87;--purple:#37003c;--pink:#ff2882;--dark:#0d0d1a;--card:#13132b;--border:rgba(0,255,135,.15);--text:#e8e8f0;--muted:#8888aa;--yellow:#ffd700;--orange:#ff6b35}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(55,0,60,.7) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(0,255,135,.08) 0%,transparent 50%);pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;padding:0 0 80px;max-width:480px;margin:0 auto}

  header{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(13,13,26,.95);backdrop-filter:blur(12px);z-index:10}
  .logo{font-family:'Bebas Neue';font-size:32px;letter-spacing:2px;color:var(--green);line-height:1}
  .logo span{color:var(--pink)}
  .header-right{display:flex;align-items:center;gap:8px}
  .gw-badge{background:var(--green);color:var(--purple);font-family:'Bebas Neue';font-size:14px;letter-spacing:1px;padding:4px 12px;border-radius:20px}
  .refresh-btn{background:none;border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
  .refresh-btn:active{color:var(--green);border-color:var(--green)}
  .refresh-btn.spinning{animation:spin .6s linear infinite}

  .tabs{display:flex;padding:16px 20px 0;gap:8px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans';font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
  .tab.active{background:var(--green);color:var(--purple);border-color:var(--green);font-weight:600}
  .section{padding:20px;display:none}
  .section.active{display:block}

  .install-banner{background:linear-gradient(135deg,rgba(0,255,135,.08),rgba(55,0,60,.4));border:1px solid rgba(0,255,135,.25);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .install-banner p{font-size:13px;color:var(--text);line-height:1.4}
  .install-banner p span{color:var(--green);font-weight:600}
  .install-btn{background:var(--green);color:var(--purple);border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .dismiss-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0}

  .dl-card{background:linear-gradient(135deg,var(--purple) 0%,#1a0033 100%);border:1px solid rgba(0,255,135,.3);border-radius:16px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
  .dl-card::after{content:'⏱';position:absolute;right:16px;top:16px;font-size:40px;opacity:.12}
  .dl-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:6px}
  .dl-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:1px;margin-bottom:8px}
  .dl-time{font-size:14px;color:var(--muted);margin-bottom:14px}
  .chip-status{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:14px}
  .chip-status.open{background:rgba(0,255,135,.15);color:var(--green);border:1px solid rgba(0,255,135,.3)}
  .chip-status.closed{background:rgba(255,40,130,.15);color:var(--pink);border:1px solid rgba(255,40,130,.3)}
  .dot{width:7px;height:7px;border-radius:50%}
  .dot.g{background:var(--green);animation:pulse 1.5s infinite}
  .dot.p{background:var(--pink)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .cd{display:flex;gap:10px}
  .cd-block{background:rgba(0,0,0,.3);border-radius:10px;padding:10px 14px;text-align:center;min-width:56px;border:1px solid var(--border)}
  .cd-num{font-family:'Bebas Neue';font-size:28px;color:var(--green);line-height:1}
  .cd-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  .sec-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;color:var(--muted);margin:16px 0 10px;display:flex;align-items:center;gap:8px}
  .sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
  .stat-icon{font-size:18px;margin-bottom:4px}
  .stat-val{font-family:'Bebas Neue';font-size:22px;color:var(--green)}
  .stat-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  .upcoming-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .up-gw{font-weight:600;font-size:14px}
  .up-date{font-size:12px;color:var(--muted);margin-top:2px}
  .up-in{font-size:12px;color:var(--green)}

  .filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .filter-row::-webkit-scrollbar{display:none}
  .filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
  .filter-btn.on{background:rgba(0,255,135,.12);color:var(--green);border-color:var(--green)}
  .toggle-row{display:flex;gap:8px;margin-bottom:12px}
  .toggle-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
  .toggle-btn.on{background:var(--green);color:var(--purple);border-color:var(--green);font-weight:700}
  .players-list{display:flex;flex-direction:column;gap:10px}
  .player-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:border-color .2s}
  .player-card.injured{border-color:rgba(255,40,130,.35)}
  .player-card.dgw{border-color:rgba(255,215,0,.35)}
  .p-rank{font-family:'Bebas Neue';font-size:22px;min-width:26px;text-align:center;color:var(--green);padding-top:2px}
  .p-rank.gold{color:#ffd700}.p-rank.silver{color:#c0c0c0}.p-rank.bronze{color:#cd7f32}
  .p-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
  .p-info{flex:1;min-width:0}
  .p-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .p-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .chips{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
  .chip{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted)}
  .chip.hi{background:rgba(0,255,135,.12);color:var(--green)}
  .chip.warn{background:rgba(255,40,130,.12);color:var(--pink)}
  .chip.gold{background:rgba(255,215,0,.1);color:var(--yellow)}
  .chip.med{background:rgba(255,107,53,.12);color:var(--orange)}
  .p-pts{text-align:right;flex-shrink:0}
  .pts-n{font-family:'Bebas Neue';font-size:26px;line-height:1}
  .pts-l{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px}

  .conf-wrap{margin-top:8px;display:flex;align-items:center;gap:8px}
  .conf-bg{flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
  .conf-fill{height:100%;border-radius:4px;transition:width .6s ease}
  .conf-txt{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}

  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
  .l-dot{width:8px;height:8px;border-radius:50%}

  .team-selector{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .team-btn{padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
  .team-btn.sel{background:rgba(0,255,135,.12);color:var(--green);border-color:var(--green)}
  .fx-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
  .fx-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .fx-t{font-weight:600;font-size:13px}
  .fx-t.away{text-align:right}
  .fx-sc{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-family:'Bebas Neue';font-size:20px;text-align:center;min-width:56px;color:var(--green)}
  .fx-sc.tbd{color:var(--muted);font-size:12px;font-family:'DM Sans';font-weight:500;padding:8px 6px}
  .fx-time{font-size:11px;color:var(--muted);margin-top:8px;text-align:center}
  .live-badge{display:inline-block;background:var(--pink);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:4px;animation:pulse 1s infinite}

  .loading{text-align:center;padding:48px 20px;color:var(--muted)}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err-box{background:rgba(255,40,130,.07);border:1px solid rgba(255,40,130,.2);border-radius:14px;padding:20px;text-align:center}
  .err-box p{color:var(--pink);font-size:13px;line-height:1.6;margin-bottom:12px}
  .retry-btn{background:none;border:1px solid var(--pink);color:var(--pink);border-radius:8px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer}

  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(13,13,26,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:10}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 14px;cursor:pointer;color:var(--muted);font-size:10px;gap:3px;border:none;background:transparent;transition:color .2s}
  .nav-item.active{color:var(--green)}
  .nav-icon{font-size:20px}

  /* ── Draft ───────────────────────────────────────────────────────────────── */
  .draft-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
  .draft-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
  .draft-stat-val{font-family:'Bebas Neue';font-size:24px;color:var(--green);line-height:1}
  .draft-stat-val.over{color:var(--pink)}
  .draft-stat-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
  .budget-bar-wrap{margin-bottom:16px}
  .budget-bar-bg{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:6px;overflow:hidden}
  .budget-bar-fill{height:100%;border-radius:6px;transition:width .4s ease,background .3s}
  .budget-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px}

  .pitch{background:linear-gradient(180deg,#0a3d1f 0%,#0d5228 25%,#0a3d1f 50%,#0d5228 75%,#0a3d1f 100%);border-radius:14px;padding:14px 10px 10px;margin-bottom:16px;border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden}
  .pitch::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent 0px,transparent 59px,rgba(255,255,255,.04) 59px,rgba(255,255,255,.04) 60px);pointer-events:none}
  .pitch-row{display:flex;justify-content:center;gap:8px;margin-bottom:10px}
  .pitch-slot{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-width:62px;max-width:72px}
  .pitch-token{width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:rgba(0,0,0,.4);transition:all .2s;position:relative;flex-shrink:0}
  .pitch-token.filled{border-color:var(--green);background:rgba(0,0,0,.6)}
  .pitch-token.filled.injured{border-color:var(--pink)}
  .pitch-token.filled.dgw{border-color:var(--yellow)}
  .pitch-token.empty{border-style:dashed;opacity:.6}
  .pitch-token.empty:active{opacity:1;border-color:var(--green)}
  .pitch-pts{position:absolute;bottom:-2px;right:-2px;background:var(--green);color:var(--purple);font-size:9px;font-weight:800;padding:1px 4px;border-radius:8px;font-family:'Bebas Neue';letter-spacing:.5px;line-height:1.4}
  .pitch-pts.warn{background:var(--pink);color:#fff}
  .pitch-name{font-size:10px;font-weight:600;text-align:center;color:#fff;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
  .pitch-meta{font-size:9px;color:rgba(255,255,255,.55);text-align:center}
  .pitch-section-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);text-align:center;margin-bottom:6px}
  .bench-divider{border:none;border-top:1px dashed rgba(255,255,255,.15);margin:8px 0 10px}

  .draft-actions{display:flex;gap:8px;margin-bottom:16px}
  .draft-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
  .draft-btn.primary{background:var(--green);color:var(--purple);border-color:var(--green)}
  .draft-btn.danger{border-color:rgba(255,40,130,.3);color:var(--pink)}
  .draft-btn:active{opacity:.8}

  /* Player picker modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
  .modal-overlay.hidden{display:none}
  .modal{background:var(--dark);border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;max-height:85vh;display:flex;flex-direction:column;border-top:1px solid var(--border)}
  .modal-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
  .modal-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:1px}
  .modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;line-height:1}
  .modal-search{padding:12px 20px;flex-shrink:0}
  .search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Sans';outline:none}
  .search-input:focus{border-color:var(--green)}
  .modal-pos-filter{display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
  .modal-pos-filter::-webkit-scrollbar{display:none}
  .modal-list{overflow-y:auto;padding:0 20px 20px;flex:1}
  .modal-player{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
  .modal-player:active{opacity:.7}
  .modal-player:last-child{border-bottom:none}
  .modal-player-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
  .modal-player-info{flex:1;min-width:0}
  .modal-player-name{font-weight:600;font-size:13px}
  .modal-player-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .modal-player-pts{text-align:right;flex-shrink:0}
  .modal-player-pts-n{font-family:'Bebas Neue';font-size:20px;color:var(--green)}
  .modal-player-pts-l{font-size:9px;color:var(--muted);letter-spacing:1px}
  .modal-empty{text-align:center;padding:30px;color:var(--muted);font-size:13px}
  .already-picked{opacity:.35;pointer-events:none}
  .formation-picker{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
  .formation-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .formation-btn.on{background:var(--green);color:var(--purple);border-color:var(--green)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">FPL<span>Hub</span></div>
    <div class="header-right">
      <div id="gwBadge" class="gw-badge">GW —</div>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()" title="Refresh data">↻</button>
    </div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('deadline')">⏱ Deadline</button>
    <button class="tab" onclick="switchTab('players')">⭐ Players</button>
    <button class="tab" onclick="switchTab('scores')">⚽ Scores</button>
    <button class="tab" onclick="switchTab('draft')">📋 Draft</button>
  </div>
  <div class="section active" id="tab-deadline">
    <div id="installBanner"></div>
    <div id="deadlineContent"><div class="loading"><div class="spinner"></div>Loading FPL data…</div></div>
  </div>
  <div class="section" id="tab-players">
    <div id="playersContent"><div class="loading"><div class="spinner"></div>Loading players…</div></div>
  </div>
  <div class="section" id="tab-scores">
    <div class="sec-title">Track Teams</div>
    <div class="team-selector" id="teamSelector"></div>
    <div id="scoresContent"><div class="loading"><div class="spinner"></div>Loading fixtures…</div></div>
  </div>
</div>
  <div class="section" id="tab-draft">
    <div id="draftContent"></div>
  </div>

  <!-- Player picker modal -->
  <div class="modal-overlay hidden" id="pickerOverlay" onclick="closePickerOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="pickerTitle">Pick Player</div>
        <button class="modal-close" onclick="closePicker()">✕</button>
      </div>
      <div class="modal-search">
        <input class="search-input" id="pickerSearch" placeholder="Search by name or team…" oninput="filterPickerList()">
      </div>
      <div class="modal-pos-filter" id="pickerPosFilter"></div>
      <div class="modal-list" id="pickerList"></div>
    </div>
  </div>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('deadline')"><span class="nav-icon">⏱</span>Deadline</button>
  <button class="nav-item" onclick="switchTab('players')"><span class="nav-icon">⭐</span>Players</button>
  <button class="nav-item" onclick="switchTab('scores')"><span class="nav-icon">⚽</span>Scores</button>
  <button class="nav-item" onclick="switchTab('draft')"><span class="nav-icon">📋</span>Draft</button>
</nav>

<script>
// ── PWA ───────────────────────────────────────────────────────────────────────
let deferredInstallPrompt = null;
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredInstallPrompt = e; showInstallBanner();
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').innerHTML = ''; deferredInstallPrompt = null;
});
function showInstallBanner() {
  if (window.matchMedia('(display-mode: standalone)').matches) return;

let fplData = null;
let fixtureData = null;

// ── Tab nav ───────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  const i = ['deadline','players','scores','draft'].indexOf(t);
  document.querySelectorAll('.tab')[i]?.classList.add('active');
  document.querySelectorAll('.nav-item')[i]?.classList.add('active');
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const url = `/api/fpl?path=${encodeURIComponent(path)}`;
  let r;
  try {
    r = await fetch(url, { signal: AbortSignal.timeout(15000) });
  } catch(e) {
    throw new Error(`Network error on ${path}: ${e.message}`);
  }
  if (!r.ok) {
    let detail = '';
    try { detail = (await r.json()).error || ''; } catch {}
    throw new Error(`${path} → HTTP ${r.status} ${detail}`);
  }
  try {
    return await r.json();
  } catch(e) {
    throw new Error(`Bad JSON from ${path}: ${e.message}`);
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
const spin = () => `<div class="loading"><div class="spinner"></div>Loading…</div>`;
const errBox = (msg, fn) => `<div class="err-box"><p>${msg}</p><button class="retry-btn" onclick="${fn}">↻ Retry</button></div>`;
const fmtDate = d => d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
const fmtShort = d => d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const fmtTime = d => d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
function timeUntil(d) { const ms=d-new Date(); if(ms<0)return'Passed'; const dy=Math.floor(ms/864e5),hr=Math.floor((ms%864e5)/36e5); return dy>0?`in ${dy}d ${hr}h`:`in ${hr}h`; }
function getNextGW() { return fplData?.events?.find(e=>e.is_next) || fplData?.events?.find(e=>e.is_current); }
function pName(id) { return fplData?.elements?.find(e=>e.id===id)?.web_name || '—'; }

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  const setAll = html => {
    document.getElementById('deadlineContent').innerHTML = html;
    document.getElementById('playersContent').innerHTML = html;
    document.getElementById('scoresContent').innerHTML = html;
  };
  setAll(spin());

  try {
    setAll(`<div class="loading"><div class="spinner"></div>Fetching bootstrap data…</div>`);
    fplData = await apiFetch('bootstrap-static/');

    setAll(`<div class="loading"><div class="spinner"></div>Fetching fixtures…</div>`);
    fixtureData = await apiFetch('fixtures/');

    document.getElementById('gwBadge').textContent = 'GW ' + (getNextGW()?.id || '—');

    try { renderDeadline(); }
    catch(e) { document.getElementById('deadlineContent').innerHTML = errBox('renderDeadline failed: ' + e.message, 'loadAll()'); }

    try { renderPlayers(playerMode, playerPos); }
    catch(e) { document.getElementById('playersContent').innerHTML = errBox('renderPlayers failed: ' + e.message, 'loadAll()'); }

    loadDraft();
    try { renderDraft(); } catch(e) { console.error('renderDraft:', e); }
    try { renderTeamSelector(); renderScores(); }
    catch(e) { document.getElementById('scoresContent').innerHTML = errBox('renderScores failed: ' + e.message, 'renderScores()'); }

  } catch(e) {
    const debugInfo = `
      <div class="err-box">
        <p>⚠️ ${e.message}</p>
        <p style="font-size:11px;color:var(--muted);margin-top:8px;word-break:break-all">
          URL: ${window.location.href}<br>
          Time: ${new Date().toLocaleTimeString()}<br>
          Online: ${navigator.onLine}
        </p>
        <button class="retry-btn" style="margin-top:12px" onclick="loadAll()">↻ Retry</button>
      </div>`;
    setAll(debugInfo);
  }
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  if (cdInterval) { clearInterval(cdInterval); cdInterval = null; }
  _predCache = null;
  fplData = null; fixtureData = null;
  await loadAll();
  btn.classList.remove('spinning');
}

// ── Deadline ──────────────────────────────────────────────────────────────────
function renderDeadline() {
  const gw = getNextGW(); if (!gw) return;
  const dl = new Date(gw.deadline_time), past = dl < new Date();
  let h = `<div class="dl-card">
    <div class="dl-label">Next Deadline</div>
    <div class="dl-title">${gw.name}</div>
    <div class="dl-time">📅 ${fmtDate(dl)}</div>
    <div class="chip-status ${past?'closed':'open'}"><span class="dot ${past?'p':'g'}"></span>${past?'Deadline Passed':'Open for Transfers'}</div>
    ${!past ? '<div class="cd" id="countdown"></div>' : ''}
  </div>`;
  if (gw.average_entry_score) {
    h += `<div class="sec-title">GW${gw.id} Stats</div><div class="stat-grid">
      ${sc('📊','Avg Score',gw.average_entry_score)}
      ${sc('🏆','Highest',gw.highest_score||'—')}
      ${sc('🔄','Transfers',gw.transfers_made ? Math.round(gw.transfers_made/1000)+'k' : '—')}
      ${sc('©','Top Captain',pName(gw.most_captained))}
    </div>`;
  }
  const upcoming = fplData.events.filter(e => !e.finished).slice(0, 5);
  if (upcoming.length) {
    h += `<div class="sec-title">Upcoming Deadlines</div>`;
    upcoming.forEach(e => { const d=new Date(e.deadline_time); h+=`<div class="upcoming-item"><div><div class="up-gw">${e.name}</div><div class="up-date">${fmtDate(d)}</div></div><div class="up-in">${timeUntil(d)}</div></div>`; });
  }
  document.getElementById('deadlineContent').innerHTML = h;
  if (!past) { if (cdInterval) clearInterval(cdInterval); tick(dl); cdInterval = setInterval(()=>tick(dl),1000); }
}
function sc(icon,lbl,val) { return `<div class="stat-card"><div class="stat-icon">${icon}</div><div class="stat-val">${val}</div><div class="stat-lbl">${lbl}</div></div>`; }
function tick(dl) {
  const el = document.getElementById('countdown'); if (!el) { clearInterval(cdInterval); return; }
  const diff = dl-new Date(); if (diff<=0) { renderDeadline(); return; }
  const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5),m=Math.floor((diff%36e5)/6e4),s=Math.floor((diff%6e4)/1e3);
  el.innerHTML=[{n:d,l:'Days'},{n:h,l:'Hrs'},{n:m,l:'Mins'},{n:s,l:'Secs'}].map(({n,l})=>`<div class="cd-block"><div class="cd-num">${String(n).padStart(2,'0')}</div><div class="cd-lbl">${l}</div></div>`).join('');
}

// ── Prediction engine ─────────────────────────────────────────────────────────

// All fixtures for a team in the NEXT gameweek (detects DGW)
function getTeamNextFixtures(teamId) {
  if (!fixtureData) return [];
  const nextGW = getNextGW();
  if (!nextGW) return [];
  return fixtureData.filter(f =>
    f.event === nextGW.id && !f.finished && (f.team_h === teamId || f.team_a === teamId)
  );
}

// Average fixture difficulty for a team this GW
function getAvgDifficulty(teamId) {
  const fixtures = getTeamNextFixtures(teamId);
  if (!fixtures.length) return null;
  const diffs = fixtures.map(f => f.team_h === teamId ? f.team_h_difficulty : f.team_a_difficulty);
  return diffs.reduce((a,b)=>a+b,0) / diffs.length;
}

// Fixture chip(s) showing opponent, H/A, difficulty colour
function getFixtureChips(teamId) {
  if (!fixtureData || !fplData) return '';
  const fixtures = getTeamNextFixtures(teamId);
  if (!fixtures.length) return '<span class="chip">No fixture</span>';
  const tmap = Object.fromEntries(fplData.teams.map(t=>[t.id,t]));
  return fixtures.map(f => {
    const isHome = f.team_h === teamId;
    const opp = isHome ? tmap[f.team_a] : tmap[f.team_h];
    const diff = isHome ? f.team_h_difficulty : f.team_a_difficulty;
    const cls = diff <= 2 ? 'hi' : diff === 3 ? 'med' : 'warn';
    return `<span class="chip ${cls}">${opp?.short_name||'?'} (${isHome?'H':'A'}) ${diff}★</span>`;
  }).join('');
}

// Core prediction algorithm
// Pre-computed stats cached here — computed once when data loads, not per-player
let _predCache = null;
function getPredCache() {
  if (_predCache) return _predCache;
  const els = fplData.elements;
  const gamesFinished = Math.max(fplData.events.filter(e => e.finished).length, 1);
  // Use reduce instead of Math.max(...spread) to avoid stack overflow on 700+ elements
  const maxThreat3 = els.filter(e=>e.element_type===3).reduce((m,e)=>Math.max(m,parseFloat(e.threat)),0);
  const maxThreat4 = els.filter(e=>e.element_type===4).reduce((m,e)=>Math.max(m,parseFloat(e.threat)),0);
  const maxCreat3  = els.filter(e=>e.element_type===3).reduce((m,e)=>Math.max(m,parseFloat(e.creativity)),0);
  const maxCreat4  = els.filter(e=>e.element_type===4).reduce((m,e)=>Math.max(m,parseFloat(e.creativity)),0);
  _predCache = { gamesFinished, maxThreat3, maxThreat4, maxCreat3, maxCreat4 };
  return _predCache;
}

function predictPoints(p, fixturesForTeam) {
  if (!p || p.minutes === 0) return 0;
  const pos = p.element_type; // 1=GK 2=DEF 3=MID 4=FWD
  // Accept pre-computed fixtures to avoid redundant calls during sort
  const fixtures = fixturesForTeam !== undefined ? fixturesForTeam : getTeamNextFixtures(p.team);
  const isDGW = fixtures.length >= 2;

  // ── Availability: knock out injured players immediately ──
  const avail = p.chance_of_playing_next_round;
  if (avail === 0) return 0;
  const availMult = avail === 25 ? 0.25 : avail === 50 ? 0.5 : avail === 75 ? 0.75 : 1.0;

  // ── Minutes multiplier ──
  const { gamesFinished, maxThreat3, maxThreat4, maxCreat3, maxCreat4 } = getPredCache();
  const avgMins = p.minutes / gamesFinished;
  const minsMult = avgMins >= 75 ? 1.0 : avgMins >= 55 ? 0.75 : avgMins >= 30 ? 0.45 : 0.2;

  // ── Position-specific base expected points ──
  const posBase = pos===1 ? 3.5 : pos===2 ? 3.8 : pos===3 ? 4.5 : 4.2;

  // ── Form bonus: capped and position-aware ──
  const form = parseFloat(p.form);
  const formCap = pos===1 ? 6 : pos===2 ? 7 : 10;
  const formNorm = Math.min(form, formCap) / formCap;
  const formBonus = formNorm * (pos===1 ? 1.5 : pos===2 ? 2.0 : pos===3 ? 3.0 : 2.5);

  // ── Fixture difficulty ──
  const diffs = fixtures.map(f => f.team_h === p.team ? f.team_h_difficulty : f.team_a_difficulty);
  const diff = diffs.length ? diffs.reduce((a,b)=>a+b,0)/diffs.length : null;
  const diffNorm = diff !== null ? (5 - diff) / 4 : 0.5;
  const fixtureBonus = diffNorm * (pos===1 ? 2.5 : pos===2 ? 2.0 : pos===3 ? 1.2 : 1.0);

  // ── Attacking threat: MID/FWD only, using pre-computed maxes ──
  let attackBonus = 0;
  if (pos === 3 || pos === 4) {
    const maxT = pos===3 ? maxThreat3 : maxThreat4;
    const maxC = pos===3 ? maxCreat3  : maxCreat4;
    const threatNorm = maxT > 0 ? parseFloat(p.threat) / maxT : 0;
    const creatNorm  = maxC > 0 ? parseFloat(p.creativity) / maxC : 0;
    attackBonus = pos===4
      ? (threatNorm * 1.5) + (creatNorm * 0.5)
      : (threatNorm * 0.8) + (creatNorm * 1.2);
  }

  // ── DGW bonus ──
  const dgwBonus = isDGW ? (formNorm * 2.0 + diffNorm * 1.0) : 0;

  const raw = posBase + formBonus + fixtureBonus + attackBonus + dgwBonus;
  const adjusted = raw * minsMult * availMult;
  const ceiling = isDGW
    ? (pos===1 ? 10 : pos===2 ? 12 : pos===3 ? 15 : 14)
    : (pos===1 ? 8  : pos===2 ? 9  : pos===3 ? 12 : 11);
  return Math.max(0, Math.min(ceiling, adjusted));
}
// Confidence in the prediction (0–100) based on data quality
function predConfidence(p) {
  let score = 50;
  const gamesFinished = fplData?.events?.filter(e=>e.finished).length || 1;
  const avgMins = p.minutes / gamesFinished;
  if (avgMins >= 80) score += 20; else if (avgMins >= 60) score += 8; else score -= 15;
  const form = parseFloat(p.form);
  if (form > 7) score += 12; else if (form > 4) score += 5; else if (form < 2) score -= 10;
  const diff = getAvgDifficulty(p.team);
  if (diff !== null && diff <= 2) score += 8;
  if (diff !== null && diff >= 5) score -= 10;
  if (p.chance_of_playing_next_round !== null && p.chance_of_playing_next_round < 100) score -= 20;
  if (getTeamNextFixtures(p.team).length >= 2) score += 5; // DGW = more data points
  return Math.max(10, Math.min(95, score));
}

function confColour(c) { return c >= 70 ? 'var(--green)' : c >= 45 ? 'var(--yellow)' : 'var(--pink)'; }

// ── Players ───────────────────────────────────────────────────────────────────
function renderPlayers(mode, pos) {
  if (!fplData) return;
  playerMode = mode; playerPos = pos;
  const tmap = Object.fromEntries(fplData.teams.map(t=>[t.id,t]));
  const posLabel = {1:'GK',2:'DEF',3:'MID',4:'FWD'};

  let list = [...fplData.elements].filter(p => p.minutes > 0);
  if (pos !== 'all') list = list.filter(p => p.element_type === +pos);

  if (mode === 'form') {
    list = list.filter(p => p.minutes > 90).sort((a,b) => parseFloat(b.form)-parseFloat(a.form));
  } else if (mode === 'pred') {
    // Reset prediction cache when re-rendering (data may have changed)
    _predCache = null;
    // Pre-compute fixtures and scores once per player, not O(n log n) times during sort
    const fixtureMap = new Map(fplData.teams.map(t => [t.id, getTeamNextFixtures(t.id)]));
    const scoreMap = new Map(list.map(p => [p.id, predictPoints(p, fixtureMap.get(p.team)||[])]));
    list = list.sort((a,b) => (scoreMap.get(b.id)||0) - (scoreMap.get(a.id)||0));
    list = list.slice(0, 15);
    // Attach pre-computed data to avoid re-calls in render loop
    list = list.map(p => ({...p, _fixtures: fixtureMap.get(p.team)||[], _pred: scoreMap.get(p.id)||0}));
  } else {
    list = list.sort((a,b) => b.total_points-a.total_points);
  }
  if (mode !== 'pred') list = list.slice(0, 15);

  const predLegend = mode === 'pred' ? `
    <div class="legend">
      <div class="legend-item"><div class="l-dot" style="background:var(--green)"></div>Easy (1–2★)</div>
      <div class="legend-item"><div class="l-dot" style="background:var(--orange)"></div>Medium (3★)</div>
      <div class="legend-item"><div class="l-dot" style="background:var(--pink)"></div>Hard (4–5★)</div>
      <div class="legend-item">⭐⭐ Double GW</div>
    </div>` : '';

  document.getElementById('playersContent').innerHTML = `
    <div class="toggle-row">
      <button class="toggle-btn ${mode==='form'?'on':''}" onclick="renderPlayers('form','${pos}')">🔥 Form</button>
      <button class="toggle-btn ${mode==='pts'?'on':''}" onclick="renderPlayers('pts','${pos}')">⭐ Season</button>
      <button class="toggle-btn ${mode==='pred'?'on':''}" onclick="renderPlayers('pred','${pos}')">🔮 Predicted</button>
    </div>
    <div class="filter-row">
      ${[['all','All'],['1','GK'],['2','DEF'],['3','MID'],['4','FWD']].map(([v,l])=>
        `<button class="filter-btn ${pos===v?'on':''}" onclick="renderPlayers('${mode}','${v}')">${l}</button>`
      ).join('')}
    </div>
    ${predLegend}
    <div class="players-list">${list.map((p,i) => {
      const t = tmap[p.team]||{}, c = COLS[i%COLS.length];
      const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const ri = i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
      const fixtures = p._fixtures || getTeamNextFixtures(p.team);
      const isDGW = fixtures.length >= 2;
      const isInjured = p.chance_of_playing_next_round !== null && p.chance_of_playing_next_round < 75;
      const cardCls = isInjured ? 'injured' : isDGW ? 'dgw' : '';
      const pred = predictPoints(p);
      const conf = predConfidence(p);
      const mainVal = mode==='pred' ? pred.toFixed(1) : mode==='form' ? p.form : p.total_points;
      const mainLbl = mode==='pred' ? 'Pred Pts' : mode==='form' ? 'Form' : 'Pts';

      return `<div class="player-card ${cardCls}">
        <div class="p-rank ${rc}">${ri}</div>
        <div class="p-av" style="background:${c}22;color:${c};border:1.5px solid ${c}55">${p.web_name.slice(0,2).toUpperCase()}</div>
        <div class="p-info">
          <div class="p-name">${p.web_name}</div>
          <div class="p-sub">${t.name||''} · ${posLabel[p.element_type]||''} · Form ${p.form}</div>
          <div class="chips">
            <span class="chip">£${(p.now_cost/10).toFixed(1)}m</span>
            <span class="chip">${parseFloat(p.selected_by_percent).toFixed(1)}% own</span>
            ${p.event_points!=null ? `<span class="chip hi">${p.event_points} GW pts</span>` : ''}
            ${isDGW ? `<span class="chip gold">⭐⭐ Double GW</span>` : ''}
            ${isInjured ? `<span class="chip warn">⚠️ ${p.chance_of_playing_next_round}% fit</span>` : ''}
            ${getFixtureChips(p.team)}
          </div>
          ${mode==='pred' ? `<div class="conf-wrap">
            <div class="conf-bg"><div class="conf-fill" style="width:${conf}%;background:${confColour(conf)}"></div></div>
            <div class="conf-txt">${conf}% confidence</div>
          </div>` : ''}
        </div>
        <div class="p-pts"><div class="pts-n">${mainVal}</div><div class="pts-l">${mainLbl}</div></div>
      </div>`;
    }).join('')}</div>`;
}

// ── Scores ────────────────────────────────────────────────────────────────────
function renderTeamSelector() {
  const teams = [...fplData.teams].sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('teamSelector').innerHTML = teams.map(t =>
    `<button class="team-btn ${selectedTeams.has(t.name)?'sel':''}" onclick="toggleTeam('${t.name}',this)">${t.name}</button>`
  ).join('');
}
function toggleTeam(name, btn) {
  selectedTeams.has(name) ? selectedTeams.delete(name) : selectedTeams.add(name);
  btn.classList.toggle('sel');
  renderScores();
}
function renderScores() {
  if (!fplData || !fixtureData) return;
  const el = document.getElementById('scoresContent');
  if (selectedTeams.size===0) { el.innerHTML='<p style="color:var(--muted);text-align:center;padding:20px;font-size:13px">Select teams above</p>'; return; }
  const tmap = Object.fromEntries(fplData.teams.map(t=>[t.id,t]));
  const sids = new Set(fplData.teams.filter(t=>selectedTeams.has(t.name)).map(t=>t.id));
  const rel = fixtureData
    .filter(f=>sids.has(f.team_h)||sids.has(f.team_a))
    .sort((a,b)=>new Date(a.kickoff_time||0)-new Date(b.kickoff_time||0));
  if (!rel.length) { el.innerHTML='<p style="color:var(--muted);text-align:center;padding:20px;font-size:13px">No fixtures found</p>'; return; }
  const byGW={}; rel.forEach(f=>{ const g=f.event||'TBC'; (byGW[g]||(byGW[g]=[])).push(f); });
  const now=new Date(); let h='';
  for (const [gw,fs] of Object.entries(byGW).reverse().slice(0,30)) {
    h += `<div class="sec-title">Gameweek ${gw}</div>`;
    fs.forEach(f => {
      const hm=tmap[f.team_h]||{}, am=tmap[f.team_a]||{};
      const kick=f.kickoff_time?new Date(f.kickoff_time):null;
      const started=kick&&kick<now, fin=f.finished;
      let score,time;
      if(fin){score=`<div class="fx-sc">${f.team_h_score} – ${f.team_a_score}</div>`;time=`<div class="fx-time">Full Time</div>`;}
      else if(started){score=`<div class="fx-sc">${f.team_h_score??0} – ${f.team_a_score??0}</div>`;time=`<div class="fx-time"><span class="live-badge">LIVE</span></div>`;}
      else{score=`<div class="fx-sc tbd">${kick?fmtShort(kick):'TBC'}</div>`;time=kick?`<div class="fx-time">${fmtTime(kick)}</div>`:''}
      h+=`<div class="fx-card"><div class="fx-row"><div class="fx-t">${hm.name||'?'}</div>${score}<div class="fx-t away">${am.name||'?'}</div></div>${time}</div>`;
    });
  }
  el.innerHTML=h;
}


// ── Draft ─────────────────────────────────────────────────────────────────────
// Formations available (DEF-MID-FWD)
const FORMATIONS = ['3-5-2','4-5-1','5-4-1','5-3-2','4-4-2','4-3-3','3-4-3','5-2-3'];
let currentFormation = localStorage.getItem('fpl_formation') || '4-3-3';

// Dynamically build slot list from a formation string e.g. "4-3-3"
function buildSlots(formation) {
  const [d,m,f] = formation.split('-').map(Number);
  const slots = [{id:'gk', pos:1, label:'GK', row:'gk', bench:false}];
  for (let i=1;i<=d;i++) slots.push({id:'def'+i, pos:2, label:'DEF', row:'def', bench:false});
  for (let i=1;i<=m;i++) slots.push({id:'mid'+i, pos:3, label:'MID', row:'mid', bench:false});
  for (let i=1;i<=f;i++) slots.push({id:'fwd'+i, pos:4, label:'FWD', row:'fwd', bench:false});
  // 4 bench: 1 GK + 3 outfield
  slots.push({id:'bgk', pos:1, label:'GK',  row:'bench', bench:true});
  slots.push({id:'b1',  pos:0, label:'OUT', row:'bench', bench:true});
  slots.push({id:'b2',  pos:0, label:'OUT', row:'bench', bench:true});
  slots.push({id:'b3',  pos:0, label:'OUT', row:'bench', bench:true});
  return slots; // always 15 total
}

function getDraftSlots() { return buildSlots(currentFormation); }

// Change formation: re-map players that still fit, discard those that don't
function setFormation(f) {
  const newSlots = buildSlots(f);
  const newTeam = {};
  // Always keep GK and bench slots as-is
  ['gk','bgk','b1','b2','b3'].forEach(id => { if (draftTeam[id]) newTeam[id] = draftTeam[id]; });
  // Re-map outfield starters by position greedily
  const posGroups = {2:[],3:[],4:[]};
  getDraftSlots().filter(s=>!s.bench && s.pos!==1).forEach(s => {
    if (draftTeam[s.id]) posGroups[s.pos].push(draftTeam[s.id]);
  });
  newSlots.filter(s=>!s.bench && s.pos!==1).forEach(s => {
    if (posGroups[s.pos] && posGroups[s.pos].length) newTeam[s.id] = posGroups[s.pos].shift();
  });
  currentFormation = f;
  draftTeam = newTeam;
  localStorage.setItem('fpl_formation', f);
  saveDraft();
  renderDraft();
}

// pos:0 on bench = any outfield position accepted
let draftTeam = {}; // slotId -> player object
let pickerSlot = null;
let pickerPosFilter = 'all';

// Load saved draft from localStorage
function loadDraft() {
  try {
    const savedFmt = localStorage.getItem('fpl_formation');
    if (savedFmt && FORMATIONS.includes(savedFmt)) currentFormation = savedFmt;
    const saved = localStorage.getItem('fpl_draft');
    if (saved && fplData) {
      const ids = JSON.parse(saved);
      draftTeam = {};
      for (const [slotId, playerId] of Object.entries(ids)) {
        const p = fplData.elements.find(e => e.id === playerId);
        if (p) draftTeam[slotId] = p;
      }
    }
  } catch {}
}

function saveDraft() {
  try {
    const ids = {};
    for (const [slotId, p] of Object.entries(draftTeam)) ids[slotId] = p.id;
    localStorage.setItem('fpl_draft', JSON.stringify(ids));
  } catch {}
}

function clearDraft() {
  if (!confirm('Clear your entire draft team?')) return;
  draftTeam = {};
  localStorage.removeItem('fpl_draft');
  renderDraft();
}

// ── Draft rendering ───────────────────────────────────────────────────────────
function renderDraft() {
  if (!fplData) return;
  const DRAFT_SLOTS = getDraftSlots();
  const tmap = Object.fromEntries(fplData.teams.map(t=>[t.id,t]));
  const posLabel = {1:'GK',2:'DEF',3:'MID',4:'FWD'};
  const validIds = new Set(DRAFT_SLOTS.map(s=>s.id));
  const filledCount = Object.keys(draftTeam).filter(k=>validIds.has(k)).length;
  const budget = 1000; // £100.0m in tenths
  const spent = Object.values(draftTeam).reduce((s,p) => s + p.now_cost, 0);
  const remaining = budget - spent;
  const remainingStr = (remaining/10).toFixed(1);
  const spentStr = (spent/10).toFixed(1);
  const budgetPct = Math.min(100, (spent/budget)*100);
  const budgetColour = remaining < 0 ? 'var(--pink)' : remaining < 50 ? 'var(--yellow)' : 'var(--green)';

  // Predicted pts — starters only
  const startingSlots = DRAFT_SLOTS.filter(s => !s.bench);
  const totalPred = startingSlots.reduce((sum, s) => {
    const p = draftTeam[s.id];
    return sum + (p ? predictPoints(p) : 0);
  }, 0);

  // Formation picker
  const formationPickerHTML = '<div class="formation-picker">' +
    FORMATIONS.map(f=>'<button class="formation-btn ' + (f===currentFormation?'on':'') + '" onclick="setFormation(\'' + f + '\')">' + f + '</button>').join('') +
    '</div>';

  // Build pitch rows
  const rows = {gk:[], def:[], mid:[], fwd:[], bench:[]};
  DRAFT_SLOTS.forEach(s => rows[s.row].push(s));

  function tokenHTML(slot) {
    const p = draftTeam[slot.id];
    const isInjured = p && p.chance_of_playing_next_round !== null && p.chance_of_playing_next_round < 75;
    const isDGW = p && getTeamNextFixtures(p.team).length >= 2;
    const pred = p ? predictPoints(p) : 0;
    const fixtures = p ? getTeamNextFixtures(p.team) : [];
    const diff = fixtures.length ? fixtures.map(f=>f.team_h===p.team?f.team_h_difficulty:f.team_a_difficulty).reduce((a,b)=>a+b,0)/fixtures.length : null;
    const ptsColour = isInjured ? 'warn' : '';
    const tokenCls = p ? ('filled' + (isInjured?' injured':isDGW?' dgw':'')) : 'empty';
    const initials = p ? p.web_name.slice(0,3).toUpperCase() : slot.label;
    const teamShort = p ? (tmap[p.team]?.short_name||'') : '';
    const fixLabel = diff !== null ? (['','E','E','M','H','H'][Math.round(diff)]||'') : '';

    return `<div class="pitch-slot" onclick="openPicker('${slot.id}')">
      <div class="pitch-token ${tokenCls}">
        ${initials}
        ${p ? `<div class="pitch-pts ${ptsColour}">${pred.toFixed(1)}</div>` : ''}
      </div>
      <div class="pitch-name">${p ? p.web_name : '+ ' + slot.label}</div>
      <div class="pitch-meta">${p ? (teamShort + (fixLabel?' · '+fixLabel:'')) : '£?m'}</div>
    </div>`;
  }

  const pitchHTML = `
    <div class="pitch">
      <div class="pitch-section-label">Goalkeeper</div>
      <div class="pitch-row">${rows.gk.map(tokenHTML).join('')}</div>
      <div class="pitch-section-label">Defenders</div>
      <div class="pitch-row">${rows.def.map(tokenHTML).join('')}</div>
      <div class="pitch-section-label">Midfielders</div>
      <div class="pitch-row">${rows.mid.map(tokenHTML).join('')}</div>
      <div class="pitch-section-label">Forwards</div>
      <div class="pitch-row">${rows.fwd.map(tokenHTML).join('')}</div>
      <hr class="bench-divider">
      <div class="pitch-section-label">Bench</div>
      <div class="pitch-row">${rows.bench.map(tokenHTML).join('')}</div>
    </div>`;

  document.getElementById('draftContent').innerHTML = `
    <div class="draft-actions">
      <button class="draft-btn primary" onclick="autoFillDraft()">⚡ Auto-Fill</button>
      <button class="draft-btn danger" onclick="clearDraft()">🗑 Clear</button>
    </div>
    <div class="draft-summary">
      <div class="draft-stat">
        <div class="draft-stat-val">${filledCount}/15</div>
        <div class="draft-stat-lbl">Players</div>
      </div>
      <div class="draft-stat">
        <div class="draft-stat-val ${remaining < 0 ? 'over' : ''}">£${remainingStr}m</div>
        <div class="draft-stat-lbl">${remaining < 0 ? 'Over Budget' : 'Remaining'}</div>
      </div>
      <div class="draft-stat">
        <div class="draft-stat-val">${totalPred.toFixed(1)}</div>
        <div class="draft-stat-lbl">Pred GW Pts</div>
      </div>
    </div>
    <div class="budget-bar-wrap">
      <div class="budget-bar-bg">
        <div class="budget-bar-fill" style="width:${budgetPct}%;background:${budgetColour}"></div>
      </div>
      <div class="budget-label"><span>£${spentStr}m spent</span><span>£100.0m budget</span></div>
    </div>
    ${formationPickerHTML}
    ${pitchHTML}
  `;
}

// ── Auto-fill: fill empty slots with highest predicted available players ──────
function autoFillDraft() {
  if (!fplData) return;
  _predCache = null;
  const pickedIds = new Set(Object.values(draftTeam).map(p=>p.id));
  const budget = 1000;
  const spent = Object.values(draftTeam).reduce((s,p)=>s+p.now_cost,0);
  let remaining = budget - spent;
  const DRAFT_SLOTS_AUTO = getDraftSlots();
  const emptySlots = DRAFT_SLOTS_AUTO.filter(s => !draftTeam[s.id]);
  if (!emptySlots.length) { renderDraft(); return; }

  // Sort available players by predicted pts
  const available = [...fplData.elements]
    .filter(p => p.minutes > 0 && !pickedIds.has(p.id))
    .sort((a,b) => predictPoints(b) - predictPoints(a));

  // Fill each empty slot greedily
  for (const slot of emptySlots) {
    const allowedPos = slot.pos === 0 ? [2,3,4] : [slot.pos];
    const candidate = available.find(p =>
      allowedPos.includes(p.element_type) &&
      p.now_cost <= remaining &&
      !Object.values(draftTeam).find(d=>d.id===p.id)
    );
    if (candidate) {
      draftTeam[slot.id] = candidate;
      remaining -= candidate.now_cost;
    }
  }
  saveDraft();
  renderDraft();
}

// ── Picker modal ──────────────────────────────────────────────────────────────
function openPicker(slotId) {
  pickerSlot = slotId;
  const slot = getDraftSlots().find(s => s.id === slotId);
  const posLabel = {1:'Goalkeeper',2:'Defender',3:'Midfielder',4:'Forward',0:'Outfield Player'};
  document.getElementById('pickerTitle').textContent = draftTeam[slotId]
    ? 'Replace ' + (posLabel[slot.pos]||'Player')
    : 'Pick ' + (posLabel[slot.pos]||'Player');
  // Show/hide remove button
  let removeBtn = document.getElementById('pickerRemoveBtn');
  if (!removeBtn) {
    removeBtn = document.createElement('button');
    removeBtn.id = 'pickerRemoveBtn';
    removeBtn.style.cssText = 'display:none;margin:0 20px 8px;width:calc(100% - 40px);padding:9px 16px;background:rgba(255,40,130,.1);border:1px solid rgba(255,40,130,.3);border-radius:10px;color:var(--pink);font-size:13px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;';
    removeBtn.textContent = '🗑 Remove Player from Squad';
    document.querySelector('.modal-search').before(removeBtn);
  }
  removeBtn.style.display = draftTeam[slotId] ? 'block' : 'none';
  removeBtn.onclick = () => removePlayer(slotId);
  document.getElementById('pickerSearch').value = '';
  pickerPosFilter = slot.pos === 0 ? 'all' : String(slot.pos);
  renderPickerPosFilter(slot.pos);
  filterPickerList();
  document.getElementById('pickerOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('pickerSearch').focus(), 100);
}

function closePicker() {
  document.getElementById('pickerOverlay').classList.add('hidden');
  pickerSlot = null;
}

function closePickerOnOverlay(e) {
  if (e.target === document.getElementById('pickerOverlay')) closePicker();
}

function renderPickerPosFilter(slotPos) {
  const el = document.getElementById('pickerPosFilter');
  // For bench outfield slots allow filtering, for position-locked slots just show that pos
  const options = slotPos === 0
    ? [['all','All'],['2','DEF'],['3','MID'],['4','FWD']]
    : [['all','All ' + ({1:'GKs',2:'DEFs',3:'MIDs',4:'FWDs'}[slotPos]||'')]];
  el.innerHTML = options.map(([v,l]) =>
    `<button class="filter-btn ${pickerPosFilter===v?'on':''}" onclick="setPickerPos('${v}')">${l}</button>`
  ).join('');
}

function setPickerPos(pos) {
  pickerPosFilter = pos;
  document.querySelectorAll('#pickerPosFilter .filter-btn').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  filterPickerList();
}

function filterPickerList() {
  if (!fplData || !pickerSlot) return;
  const slot = getDraftSlots().find(s => s.id === pickerSlot);
  const query = document.getElementById('pickerSearch').value.toLowerCase();
  const tmap = Object.fromEntries(fplData.teams.map(t=>[t.id,t]));
  const pickedIds = new Set(Object.values(draftTeam).map(p=>p.id));
  const budget = 1000;
  const currentPlayer = draftTeam[pickerSlot];
  const spent = Object.values(draftTeam).reduce((s,p)=>s+p.now_cost,0);
  const availBudget = budget - spent + (currentPlayer ? currentPlayer.now_cost : 0);

  // Determine allowed positions
  let allowedPos = slot.pos === 0 ? [2,3,4] : [slot.pos];
  if (pickerPosFilter !== 'all' && slot.pos === 0) allowedPos = [+pickerPosFilter];

  _predCache = null;
  let players = [...fplData.elements]
    .filter(p => {
      if (!allowedPos.includes(p.element_type)) return false;
      if (query && !p.web_name.toLowerCase().includes(query) && !(tmap[p.team]?.name||'').toLowerCase().includes(query)) return false;
      return true;
    })
    .sort((a,b) => predictPoints(b) - predictPoints(a))
    .slice(0, 50);

  if (!players.length) {
    document.getElementById('pickerList').innerHTML = '<div class="modal-empty">No players found</div>';
    return;
  }

  const posLabel = {1:'GK',2:'DEF',3:'MID',4:'FWD'};
  document.getElementById('pickerList').innerHTML = players.map((p,i) => {
    const t = tmap[p.team]||{};
    const col = ['#00ff87','#ff2882','#7b61ff','#ffd700','#00d4ff','#ff6b35'][i%6];
    const pred = predictPoints(p);
    const isAlreadyPicked = pickedIds.has(p.id) && !(currentPlayer && currentPlayer.id===p.id);
    const fixtures = getTeamNextFixtures(p.team);
    const diff = fixtures.length ? fixtures.map(f=>f.team_h===p.team?f.team_h_difficulty:f.team_a_difficulty).reduce((a,b)=>a+b,0)/fixtures.length : null;
    const diffLabel = diff !== null ? (['','Easy','Easy','Med','Hard','Hard'][Math.round(diff)]||'') : '';
    const overBudget = p.now_cost > availBudget && !(currentPlayer && currentPlayer.id===p.id);
    const injLabel = p.chance_of_playing_next_round !== null && p.chance_of_playing_next_round < 100
      ? ` · ${p.chance_of_playing_next_round}% fit` : '';
    return `<div class="modal-player ${isAlreadyPicked?'already-picked':''}" onclick="pickPlayer(${p.id})">
      <div class="modal-player-av" style="background:${col}22;color:${col};border:1.5px solid ${col}44">${p.web_name.slice(0,2).toUpperCase()}</div>
      <div class="modal-player-info">
        <div class="modal-player-name">${p.web_name}${fixtures.length>=2?' ⭐⭐':''}</div>
        <div class="modal-player-sub">${t.name||''} · ${posLabel[p.element_type]||''} · £${(p.now_cost/10).toFixed(1)}m${overBudget?' · <span style=\"color:var(--pink)\">Over budget</span>':''}${injLabel}${diffLabel?' · '+diffLabel:''}</div>
      </div>
      <div class="modal-player-pts">
        <div class="modal-player-pts-n">${pred.toFixed(1)}</div>
        <div class="modal-player-pts-l">Pred Pts</div>
      </div>
    </div>`;
  }).join('');
}

function removePlayer(slotId) {
  delete draftTeam[slotId];
  saveDraft();
  closePicker();
  renderDraft();
}

function pickPlayer(playerId) {
  if (!pickerSlot || !fplData) return;
  const p = fplData.elements.find(e => e.id === playerId);
  if (!p) return;
  draftTeam[pickerSlot] = p;
  saveDraft();
  closePicker();
  renderDraft();
}

// ── Init ───────────────────────────────────────────────────────────────────────
loadAll();
</script>
