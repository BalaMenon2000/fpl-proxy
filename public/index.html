<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00ff87">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FPL Hub">
<meta name="description" content="FPL deadline countdown, top players, predictions & live scores">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>FPL Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--green:#00ff87;--purple:#37003c;--pink:#ff2882;--dark:#0d0d1a;--card:#13132b;--border:rgba(0,255,135,.15);--text:#e8e8f0;--muted:#8888aa;--yellow:#ffd700;--orange:#ff6b35}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(55,0,60,.7) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(0,255,135,.08) 0%,transparent 50%);pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;padding:0 0 80px;max-width:480px;margin:0 auto}

  header{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(13,13,26,.95);backdrop-filter:blur(12px);z-index:10}
  .logo{font-family:'Bebas Neue';font-size:32px;letter-spacing:2px;color:var(--green);line-height:1}
  .logo span{color:var(--pink)}
  .header-right{display:flex;align-items:center;gap:8px}
  .gw-badge{background:var(--green);color:var(--purple);font-family:'Bebas Neue';font-size:14px;letter-spacing:1px;padding:4px 12px;border-radius:20px}
  .refresh-btn{background:none;border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
  .refresh-btn:active{color:var(--green);border-color:var(--green)}
  .refresh-btn.spinning{animation:spin .6s linear infinite}

  .tabs{display:flex;padding:16px 20px 0;gap:8px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans';font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
  .tab.active{background:var(--green);color:var(--purple);border-color:var(--green);font-weight:600}
  .section{padding:20px;display:none}
  .section.active{display:block}

  .install-banner{background:linear-gradient(135deg,rgba(0,255,135,.08),rgba(55,0,60,.4));border:1px solid rgba(0,255,135,.25);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .install-banner p{font-size:13px;color:var(--text);line-height:1.4}
  .install-banner p span{color:var(--green);font-weight:600}
  .install-btn{background:var(--green);color:var(--purple);border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .dismiss-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0}

  .dl-card{background:linear-gradient(135deg,var(--purple) 0%,#1a0033 100%);border:1px solid rgba(0,255,135,.3);border-radius:16px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
  .dl-card::after{content:'⏱';position:absolute;right:16px;top:16px;font-size:40px;opacity:.12}
  .dl-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:6px}
  .dl-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:1px;margin-bottom:8px}
  .dl-time{font-size:14px;color:var(--muted);margin-bottom:14px}
  .chip-status{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:14px}
  .chip-status.open{background:rgba(0,255,135,.15);color:var(--green);border:1px solid rgba(0,255,135,.3)}
  .chip-status.closed{background:rgba(255,40,130,.15);color:var(--pink);border:1px solid rgba(255,40,130,.3)}
  .dot{width:7px;height:7px;border-radius:50%}
  .dot.g{background:var(--green);animation:pulse 1.5s infinite}
  .dot.p{background:var(--pink)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .cd{display:flex;gap:10px}
  .cd-block{background:rgba(0,0,0,.3);border-radius:10px;padding:10px 14px;text-align:center;min-width:56px;border:1px solid var(--border)}
  .cd-num{font-family:'Bebas Neue';font-size:28px;color:var(--green);line-height:1}
  .cd-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  .sec-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;color:var(--muted);margin:16px 0 10px;display:flex;align-items:center;gap:8px}
  .sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
  .stat-icon{font-size:18px;margin-bottom:4px}
  .stat-val{font-family:'Bebas Neue';font-size:22px;color:var(--green)}
  .stat-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  .upcoming-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .up-gw{font-weight:600;font-size:14px}
  .up-date{font-size:12px;color:var(--muted);margin-top:2px}
  .up-in{font-size:12px;color:var(--green)}

  .filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .filter-row::-webkit-scrollbar{display:none}
  .filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
  .filter-btn.on{background:rgba(0,255,135,.12);color:var(--green);border-color:var(--green)}
  .toggle-row{display:flex;gap:8px;margin-bottom:12px}
  .toggle-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
  .toggle-btn.on{background:var(--green);color:var(--purple);border-color:var(--green);font-weight:700}
  .players-list{display:flex;flex-direction:column;gap:10px}
  .player-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:border-color .2s}
  .player-card.injured{border-color:rgba(255,40,130,.35)}
  .player-card.dgw{border-color:rgba(255,215,0,.35)}
  .p-rank{font-family:'Bebas Neue';font-size:22px;min-width:26px;text-align:center;color:var(--green);padding-top:2px}
  .p-rank.gold{color:#ffd700}.p-rank.silver{color:#c0c0c0}.p-rank.bronze{color:#cd7f32}
  .p-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
  .p-info{flex:1;min-width:0}
  .p-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .p-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .chips{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
  .chip{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted)}
  .chip.hi{background:rgba(0,255,135,.12);color:var(--green)}
  .chip.warn{background:rgba(255,40,130,.12);color:var(--pink)}
  .chip.gold{background:rgba(255,215,0,.1);color:var(--yellow)}
  .chip.med{background:rgba(255,107,53,.12);color:var(--orange)}
  .p-pts{text-align:right;flex-shrink:0}
  .pts-n{font-family:'Bebas Neue';font-size:26px;line-height:1}
  .pts-l{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px}

  .conf-wrap{margin-top:8px;display:flex;align-items:center;gap:8px}
  .conf-bg{flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
  .conf-fill{height:100%;border-radius:4px;transition:width .6s ease}
  .conf-txt{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}

  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
  .l-dot{width:8px;height:8px;border-radius:50%}

  .team-selector{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .team-btn{padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
  .team-btn.sel{background:rgba(0,255,135,.12);color:var(--green);border-color:var(--green)}
  .fx-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
  .fx-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .fx-t{font-weight:600;font-size:13px}
  .fx-t.away{text-align:right}
  .fx-sc{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-family:'Bebas Neue';font-size:20px;text-align:center;min-width:56px;color:var(--green)}
  .fx-sc.tbd{color:var(--muted);font-size:12px;font-family:'DM Sans';font-weight:500;padding:8px 6px}
  .fx-time{font-size:11px;color:var(--muted);margin-top:8px;text-align:center}
  .live-badge{display:inline-block;background:var(--pink);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:4px;animation:pulse 1s infinite}

  .loading{text-align:center;padding:48px 20px;color:var(--muted)}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err-box{background:rgba(255,40,130,.07);border:1px solid rgba(255,40,130,.2);border-radius:14px;padding:20px;text-align:center}
  .err-box p{color:var(--pink);font-size:13px;line-height:1.6;margin-bottom:12px}
  .retry-btn{background:none;border:1px solid var(--pink);color:var(--pink);border-radius:8px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer}

  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(13,13,26,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:10}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 14px;cursor:pointer;color:var(--muted);font-size:10px;gap:3px;border:none;background:transparent;transition:color .2s}
  .nav-item.active{color:var(--green)}
  .nav-icon{font-size:20px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">FPL<span>Hub</span></div>
    <div class="header-right">
      <div id="gwBadge" class="gw-badge">GW —</div>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()" title="Refresh data">↻</button>
    </div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('deadline')">⏱ Deadline</button>
    <button class="tab" onclick="switchTab('players')">⭐ Players</button>
    <button class="tab" onclick="switchTab('scores')">⚽ Scores</button>
  </div>
  <div class="section active" id="tab-deadline">
    <div id="installBanner"></div>
    <div id="deadlineContent"><div class="loading"><div class="spinner"></div>Loading FPL data…</div></div>
  </div>
  <div class="section" id="tab-players">
    <div id="playersContent"><div class="loading"><div class="spinner"></div>Loading players…</div></div>
  </div>
  <div class="section" id="tab-scores">
    <div class="sec-title">Track Teams</div>
    <div class="team-selector" id="teamSelector"></div>
    <div id="scoresContent"><div class="loading"><div class="spinner"></div>Loading fixtures…</div></div>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('deadline')"><span class="nav-icon">⏱</span>Deadline</button>
  <button class="nav-item" onclick="switchTab('players')"><span class="nav-icon">⭐</span>Players</button>
  <button class="nav-item" onclick="switchTab('scores')"><span class="nav-icon">⚽</span>Scores</button>
</nav>

<script>
// ── PWA ───────────────────────────────────────────────────────────────────────
let deferredInstallPrompt = null;
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredInstallPrompt = e; showInstallBanner();
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').innerHTML = ''; deferredInstallPrompt = null;
});
function showInstallBanner() {
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  document.getElementById('installBanner').innerHTML = `
    <div class="install-banner">
      <p>📲 Add <span>FPL Hub</span> to your home screen</p>
      <button class="install-btn" onclick="triggerInstall()">Install</button>
      <button class="dismiss-btn" onclick="this.parentElement.parentElement.innerHTML=''">✕</button>
    </div>`;
}
async function triggerInstall() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  document.getElementById('installBanner').innerHTML = '';
}

// ── State ─────────────────────────────────────────────────────────────────────
let fplData = null;
let fixtureData = null;
let selectedTeams = new Set(['Arsenal','Chelsea','Liverpool','Man City','Man Utd','Spurs']);
let playerMode = 'form';
let playerPos = 'all';
let cdInterval = null;
const COLS = ['#00ff87','#ff2882','#7b61ff','#ffd700','#00d4ff','#ff6b35'];

// ── Tab nav ───────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  const i = ['deadline','players','scores'].indexOf(t);
  document.querySelectorAll('.tab')[i]?.classList.add('active');
  document.querySelectorAll('.nav-item')[i]?.classList.add('active');
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(`/api/fpl?path=${encodeURIComponent(path)}`, { signal: AbortSignal.timeout(15000) });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || `HTTP ${r.status}`); }
  return r.json();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
const spin = () => `<div class="loading"><div class="spinner"></div>Loading…</div>`;
const errBox = (msg, fn) => `<div class="err-box"><p>${msg}</p><button class="retry-btn" onclick="${fn}">↻ Retry</button></div>`;
const fmtDate = d => d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
const fmtShort = d => d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const fmtTime = d => d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
function timeUntil(d) { const ms=d-new Date(); if(ms<0)return'Passed'; const dy=Math.floor(ms/864e5),hr=Math.floor((ms%864e5)/36e5); return dy>0?`in ${dy}d ${hr}h`:`in ${hr}h`; }
function getNextGW() { return fplData?.events?.find(e=>e.is_next) || fplData?.events?.find(e=>e.is_current); }
function pName(id) { return fplData?.elements?.find(e=>e.id===id)?.web_name || '—'; }

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  document.getElementById('deadlineContent').innerHTML = spin();
  document.getElementById('playersContent').innerHTML = spin();
  document.getElementById('scoresContent').innerHTML = spin();
  try {
    // Fetch both in parallel for speed
    [fplData, fixtureData] = await Promise.all([
      apiFetch('bootstrap-static/'),
      apiFetch('fixtures/')
    ]);
    document.getElementById('gwBadge').textContent = 'GW ' + (getNextGW()?.id || '—');
    renderDeadline();
    renderPlayers(playerMode, playerPos);
    renderTeamSelector();
    renderScores();
  } catch(e) {
    const msg = errBox('⚠️ ' + e.message, 'loadAll()');
    document.getElementById('deadlineContent').innerHTML = msg;
    document.getElementById('playersContent').innerHTML = msg;
    document.getElementById('scoresContent').innerHTML = msg;
  }
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  fplData = null; fixtureData = null;
  await loadAll();
  btn.classList.remove('spinning');
}

// ── Deadline ──────────────────────────────────────────────────────────────────
function renderDeadline() {
  const gw = getNextGW(); if (!gw) return;
  const dl = new Date(gw.deadline_time), past = dl < new Date();
  let h = `<div class="dl-card">
    <div class="dl-label">Next Deadline</div>
    <div class="dl-title">${gw.name}</div>
    <div class="dl-time">📅 ${fmtDate(dl)}</div>
    <div class="chip-status ${past?'closed':'open'}"><span class="dot ${past?'p':'g'}"></span>${past?'Deadline Passed':'Open for Transfers'}</div>
    ${!past ? '<div class="cd" id="countdown"></div>' : ''}
  </div>`;
  if (gw.average_entry_score) {
    h += `<div class="sec-title">GW${gw.id} Stats</div><div class="stat-grid">
      ${sc('📊','Avg Score',gw.average_entry_score)}
      ${sc('🏆','Highest',gw.highest_score||'—')}
      ${sc('🔄','Transfers',gw.transfers_made ? Math.round(gw.transfers_made/1000)+'k' : '—')}
      ${sc('©','Top Captain',pName(gw.most_captained))}
    </div>`;
  }
  const upcoming = fplData.events.filter(e => !e.finished).slice(0, 5);
  if (upcoming.length) {
    h += `<div class="sec-title">Upcoming Deadlines</div>`;
    upcoming.forEach(e => { const d=new Date(e.deadline_time); h+=`<div class="upcoming-item"><div><div class="up-gw">${e.name}</div><div class="up-date">${fmtDate(d)}</div></div><div class="up-in">${timeUntil(d)}</div></div>`; });
  }
  document.getElementById('deadlineContent').innerHTML = h;
  if (!past) { if (cdInterval) clearInterval(cdInterval); tick(dl); cdInterval = setInterval(()=>tick(dl),1000); }
}
function sc(icon,lbl,val) { return `<div class="stat-card"><div class="stat-icon">${icon}</div><div class="stat-val">${val}</div><div class="stat-lbl">${lbl}</div></div>`; }
function tick(dl) {
  const el = document.getElementById('countdown'); if (!el) { clearInterval(cdInterval); return; }
  const diff = dl-new Date(); if (diff<=0) { renderDeadline(); return; }
  const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5),m=Math.floor((diff%36e5)/6e4),s=Math.floor((diff%6e4)/1e3);
  el.innerHTML=[{n:d,l:'Days'},{n:h,l:'Hrs'},{n:m,l:'Mins'},{n:s,l:'Secs'}].map(({n,l})=>`<div class="cd-block"><div class="cd-num">${String(n).padStart(2,'0')}</div><div class="cd-lbl">${l}</div></div>`).join('');
}

// ── Prediction engine ─────────────────────────────────────────────────────────

// All fixtures for a team in the NEXT gameweek (detects DGW)
function getTeamNextFixtures(teamId) {
  if (!fixtureData) return [];
  const nextGW = getNextGW();
  if (!nextGW) return [];
  return fixtureData.filter(f =>
    f.event === nextGW.id && !f.finished && (f.team_h === teamId || f.team_a === teamId)
  );
}

// Average fixture difficulty for a team this GW
function getAvgDifficulty(teamId) {
  const fixtures = getTeamNextFixtures(teamId);
  if (!fixtures.length) return null;
  const diffs = fixtures.map(f => f.team_h === teamId ? f.team_h_difficulty : f.team_a_difficulty);
  return diffs.reduce((a,b)=>a+b,0) / diffs.length;
}

// Fixture chip(s) showing opponent, H/A, difficulty colour
function getFixtureChips(teamId) {
  if (!fixtureData || !fplData) return '';
  const fixtures = getTeamNextFixtures(teamId);
  if (!fixtures.length) return '<span class="chip">No fixture</span>';
  const tmap = Object.fromEntries(fplData.teams.map(t=>[t.id,t]));
  return fixtures.map(f => {
    const isHome = f.team_h === teamId;
    const opp = isHome ? tmap[f.team_a] : tmap[f.team_h];
    const diff = isHome ? f.team_h_difficulty : f.team_a_difficulty;
    const cls = diff <= 2 ? 'hi' : diff === 3 ? 'med' : 'warn';
    return `<span class="chip ${cls}">${opp?.short_name||'?'} (${isHome?'H':'A'}) ${diff}★</span>`;
  }).join('');
}

// Core prediction algorithm
  
function predictPoints(p) {
  if (!p || p.minutes === 0) return 0;
  const pos = p.element_type; // 1=GK 2=DEF 3=MID 4=FWD
  const fixtures = getTeamNextFixtures(p.team);
  const isDGW = fixtures.length >= 2;

  // ── Availability: knock out injured players immediately ──
  const avail = p.chance_of_playing_next_round;
  if (avail === 0) return 0;
  const availMult = avail === 25 ? 0.25 : avail === 50 ? 0.5 : avail === 75 ? 0.75 : 1.0;

  // ── Minutes multiplier: if they don't play, nothing else matters ──
  const gamesFinished = Math.max(fplData.events.filter(e => e.finished).length, 1);
  const avgMins = p.minutes / gamesFinished;
  const minsMult = avgMins >= 75 ? 1.0 : avgMins >= 55 ? 0.75 : avgMins >= 30 ? 0.45 : 0.2;

  // ── Position-specific base expected points ──
  // Reflects realistic average before bonuses
  const posBase = pos===1 ? 3.5 : pos===2 ? 3.8 : pos===3 ? 4.5 : pos===4 ? 4.2;

  // ── Form bonus: capped and position-aware ──
  // GKs rarely exceed form 6, attackers can hit 10+
  const form = parseFloat(p.form);
  const formCap = pos===1 ? 6 : pos===2 ? 7 : 10;
  const formNorm = Math.min(form, formCap) / formCap; // 0.0 → 1.0
  const formBonus = formNorm * (pos===1 ? 1.5 : pos===2 ? 2.0 : pos===3 ? 3.0 : 2.5);

  // ── Fixture difficulty: affects clean sheets and attacking returns ──
  const diff = getAvgDifficulty(p.team);
  const diffNorm = diff !== null ? (5 - diff) / 4 : 0.5; // 0.0 (hardest) → 1.0 (easiest)
  // GKs/DEFs care more about fixture (clean sheet chance)
  // FWDs/MIDs care somewhat but can score against anyone
  const fixturWeight = pos===1 ? 2.5 : pos===2 ? 2.0 : pos===3 ? 1.2 : 1.0;
  const fixtureBonus = diffNorm * fixturWeight;

  // ── Attacking threat: only meaningful for MID/FWD ──
  let attackBonus = 0;
  if (pos === 3 || pos === 4) {
    const maxThreat = Math.max(...fplData.elements.filter(e=>e.element_type===pos).map(e=>parseFloat(e.threat)));
    const threatNorm = maxThreat > 0 ? parseFloat(p.threat) / maxThreat : 0;
    const maxCreat = Math.max(...fplData.elements.filter(e=>e.element_type===pos).map(e=>parseFloat(e.creativity)));
    const creatNorm = maxCreat > 0 ? parseFloat(p.creativity) / maxCreat : 0;
    // FWDs get more from threat, MIDs get more from creativity
    attackBonus = pos===4
      ? (threatNorm * 1.5) + (creatNorm * 0.5)
      : (threatNorm * 0.8) + (creatNorm * 1.2);
  }

  // ── DGW bonus: scales with how likely they are to play and score ──
  const dgwBonus = isDGW ? (formNorm * 2.0 + diffNorm * 1.0) : 0;

  // ── Sum up ──
  const raw = posBase + formBonus + fixtureBonus + attackBonus + dgwBonus;

  // Apply minutes and availability as multipliers, not additions
  // This way a 50% fit player can't score 13 pts
  const adjusted = raw * minsMult * availMult;

  // ── Position-specific realistic ceilings ──
  const ceiling = isDGW
    ? (pos===1 ? 10 : pos===2 ? 12 : pos===3 ? 15 : 14)
    : (pos===1 ? 8  : pos===2 ? 9  : pos===3 ? 12 : 11);

  return Math.max(0, Math.min(ceiling, adjusted));
}
// Confidence in the prediction (0–100) based on data quality
function predConfidence(p) {
  let score = 50;
  const gamesFinished = fplData?.events?.filter(e=>e.finished).length || 1;
  const avgMins = p.minutes / gamesFinished;
  if (avgMins >= 80) score += 20; else if (avgMins >= 60) score += 8; else score -= 15;
  const form = parseFloat(p.form);
  if (form > 7) score += 12; else if (form > 4) score += 5; else if (form < 2) score -= 10;
  const diff = getAvgDifficulty(p.team);
  if (diff !== null && diff <= 2) score += 8;
  if (diff !== null && diff >= 5) score -= 10;
  if (p.chance_of_playing_next_round !== null && p.chance_of_playing_next_round < 100) score -= 20;
  if (getTeamNextFixtures(p.team).length >= 2) score += 5; // DGW = more data points
  return Math.max(10, Math.min(95, score));
}

function confColour(c) { return c >= 70 ? 'var(--green)' : c >= 45 ? 'var(--yellow)' : 'var(--pink)'; }

// ── Players ───────────────────────────────────────────────────────────────────
function renderPlayers(mode, pos) {
  if (!fplData) return;
  playerMode = mode; playerPos = pos;
  const tmap = Object.fromEntries(fplData.teams.map(t=>[t.id,t]));
  const posLabel = {1:'GK',2:'DEF',3:'MID',4:'FWD'};

  let list = [...fplData.elements].filter(p => p.minutes > 0);
  if (pos !== 'all') list = list.filter(p => p.element_type === +pos);

  if (mode === 'form') {
    list = list.filter(p => p.minutes > 90).sort((a,b) => parseFloat(b.form)-parseFloat(a.form));
  } else if (mode === 'pred') {
    list = list.sort((a,b) => predictPoints(b)-predictPoints(a));
  } else {
    list = list.sort((a,b) => b.total_points-a.total_points);
  }
  list = list.slice(0, 15);

  const predLegend = mode === 'pred' ? `
    <div class="legend">
      <div class="legend-item"><div class="l-dot" style="background:var(--green)"></div>Easy (1–2★)</div>
      <div class="legend-item"><div class="l-dot" style="background:var(--orange)"></div>Medium (3★)</div>
      <div class="legend-item"><div class="l-dot" style="background:var(--pink)"></div>Hard (4–5★)</div>
      <div class="legend-item">⭐⭐ Double GW</div>
    </div>` : '';

  document.getElementById('playersContent').innerHTML = `
    <div class="toggle-row">
      <button class="toggle-btn ${mode==='form'?'on':''}" onclick="renderPlayers('form','${pos}')">🔥 Form</button>
      <button class="toggle-btn ${mode==='pts'?'on':''}" onclick="renderPlayers('pts','${pos}')">⭐ Season</button>
      <button class="toggle-btn ${mode==='pred'?'on':''}" onclick="renderPlayers('pred','${pos}')">🔮 Predicted</button>
    </div>
    <div class="filter-row">
      ${[['all','All'],['1','GK'],['2','DEF'],['3','MID'],['4','FWD']].map(([v,l])=>
        `<button class="filter-btn ${pos===v?'on':''}" onclick="renderPlayers('${mode}','${v}')">${l}</button>`
      ).join('')}
    </div>
    ${predLegend}
    <div class="players-list">${list.map((p,i) => {
      const t = tmap[p.team]||{}, c = COLS[i%COLS.length];
      const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const ri = i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
      const fixtures = getTeamNextFixtures(p.team);
      const isDGW = fixtures.length >= 2;
      const isInjured = p.chance_of_playing_next_round !== null && p.chance_of_playing_next_round < 75;
      const cardCls = isInjured ? 'injured' : isDGW ? 'dgw' : '';
      const pred = predictPoints(p);
      const conf = predConfidence(p);
      const mainVal = mode==='pred' ? pred.toFixed(1) : mode==='form' ? p.form : p.total_points;
      const mainLbl = mode==='pred' ? 'Pred Pts' : mode==='form' ? 'Form' : 'Pts';

      return `<div class="player-card ${cardCls}">
        <div class="p-rank ${rc}">${ri}</div>
        <div class="p-av" style="background:${c}22;color:${c};border:1.5px solid ${c}55">${p.web_name.slice(0,2).toUpperCase()}</div>
        <div class="p-info">
          <div class="p-name">${p.web_name}</div>
          <div class="p-sub">${t.name||''} · ${posLabel[p.element_type]||''} · Form ${p.form}</div>
          <div class="chips">
            <span class="chip">£${(p.now_cost/10).toFixed(1)}m</span>
            <span class="chip">${parseFloat(p.selected_by_percent).toFixed(1)}% own</span>
            ${p.event_points!=null ? `<span class="chip hi">${p.event_points} GW pts</span>` : ''}
            ${isDGW ? `<span class="chip gold">⭐⭐ Double GW</span>` : ''}
            ${isInjured ? `<span class="chip warn">⚠️ ${p.chance_of_playing_next_round}% fit</span>` : ''}
            ${getFixtureChips(p.team)}
          </div>
          ${mode==='pred' ? `<div class="conf-wrap">
            <div class="conf-bg"><div class="conf-fill" style="width:${conf}%;background:${confColour(conf)}"></div></div>
            <div class="conf-txt">${conf}% confidence</div>
          </div>` : ''}
        </div>
        <div class="p-pts"><div class="pts-n">${mainVal}</div><div class="pts-l">${mainLbl}</div></div>
      </div>`;
    }).join('')}</div>`;
}

// ── Scores ────────────────────────────────────────────────────────────────────
function renderTeamSelector() {
  const teams = [...fplData.teams].sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('teamSelector').innerHTML = teams.map(t =>
    `<button class="team-btn ${selectedTeams.has(t.name)?'sel':''}" onclick="toggleTeam('${t.name}',this)">${t.name}</button>`
  ).join('');
}
function toggleTeam(name, btn) {
  selectedTeams.has(name) ? selectedTeams.delete(name) : selectedTeams.add(name);
  btn.classList.toggle('sel');
  renderScores();
}
function renderScores() {
  if (!fplData || !fixtureData) return;
  const el = document.getElementById('scoresContent');
  if (selectedTeams.size===0) { el.innerHTML='<p style="color:var(--muted);text-align:center;padding:20px;font-size:13px">Select teams above</p>'; return; }
  const tmap = Object.fromEntries(fplData.teams.map(t=>[t.id,t]));
  const sids = new Set(fplData.teams.filter(t=>selectedTeams.has(t.name)).map(t=>t.id));
  const rel = fixtureData
    .filter(f=>sids.has(f.team_h)||sids.has(f.team_a))
    .sort((a,b)=>new Date(a.kickoff_time||0)-new Date(b.kickoff_time||0));
  if (!rel.length) { el.innerHTML='<p style="color:var(--muted);text-align:center;padding:20px;font-size:13px">No fixtures found</p>'; return; }
  const byGW={}; rel.forEach(f=>{ const g=f.event||'TBC'; (byGW[g]||(byGW[g]=[])).push(f); });
  const now=new Date(); let h='';
  for (const [gw,fs] of Object.entries(byGW).slice(0,30)) {
    h += `<div class="sec-title">Gameweek ${gw}</div>`;
    fs.forEach(f => {
      const hm=tmap[f.team_h]||{}, am=tmap[f.team_a]||{};
      const kick=f.kickoff_time?new Date(f.kickoff_time):null;
      const started=kick&&kick<now, fin=f.finished;
      let score,time;
      if(fin){score=`<div class="fx-sc">${f.team_h_score} – ${f.team_a_score}</div>`;time=`<div class="fx-time">Full Time</div>`;}
      else if(started){score=`<div class="fx-sc">${f.team_h_score??0} – ${f.team_a_score??0}</div>`;time=`<div class="fx-time"><span class="live-badge">LIVE</span></div>`;}
      else{score=`<div class="fx-sc tbd">${kick?fmtShort(kick):'TBC'}</div>`;time=kick?`<div class="fx-time">${fmtTime(kick)}</div>`:''}
      h+=`<div class="fx-card"><div class="fx-row"><div class="fx-t">${hm.name||'?'}</div>${score}<div class="fx-t away">${am.name||'?'}</div></div>${time}</div>`;
    });
  }
  el.innerHTML=h;
}

// ── Init ───────────────────────────────────────────────────────────────────────
loadAll();
</script>
